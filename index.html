<style>
:root {
  --bg: #0d0d0d; --bg2: #161616; --bg3: #1f1f1f; --bg4: #2a2a2a;
  --surface: #1a1a1a; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0; --text2: #999; --text3: #666;
  --accent: #c8ff00; --accent2: #a8d400;
  --accent-dim: rgba(200,255,0,0.12); --accent-dim2: rgba(200,255,0,0.06);
  --red: #ff4d4d; --orange: #ff9d3d; --blue: #4d9fff; --purple: #9d7fff;
  --radius: 14px; --radius-sm: 8px; --radius-lg: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px; background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
}
.nav-logo { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
.nav-logo span { color: var(--text2); font-size: 13px; margin-left: 8px; font-family: 'Noto Sans KR', sans-serif; font-weight: 400; }
.nav-actions { display: flex; gap: 8px; }
.nav-btn {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 7px 14px;
  font-size: 13px; color: var(--text2); cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
}
.nav-btn:hover { background: var(--bg4); color: var(--text); }

/* LAYOUT */
.layout { display: flex; flex-direction: column; height: 100vh; padding-top: 56px; }

/* MAP */
.map-area { position: relative; height: 42vh; min-height: 260px; flex-shrink: 0; background: var(--bg2); }
#kakaoMap { width: 100%; height: 100%; }

/* 카카오맵 키 없을 때 fallback */
.map-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; background: var(--bg2);
}
.map-placeholder-icon { font-size: 32px; }
.map-placeholder-text { font-size: 13px; color: var(--text3); text-align: center; line-height: 1.6; }
.map-placeholder-text a { color: var(--accent); text-decoration: none; }

.map-overlay {
  position: absolute; bottom: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 6px; z-index: 30;
}
.map-overlay-btn {
  width: 36px; height: 36px; background: var(--bg2);
  border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text2); transition: all 0.15s;
}
.map-overlay-btn:hover { background: var(--bg4); color: var(--text); }

/* RIGHT PANEL */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* FILTERS */
.filter-bar {
  background: var(--bg); padding: 10px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text2);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s; white-space: nowrap;
}
.filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* LIST */
.list-area { flex: 1; overflow-y: auto; background: var(--bg); scrollbar-width: thin; scrollbar-color: var(--bg4) transparent; }
.list-header {
  padding: 14px 18px 4px; font-size: 12px; color: var(--text3);
  display: flex; align-items: center; justify-content: space-between;
}
.list-header span { color: var(--accent); }
.course-list { padding: 6px 14px 20px; display: flex; flex-direction: column; gap: 10px; }

/* COURSE CARD */
.course-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.course-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 2px 0 0 2px; background: var(--text3); transition: background 0.2s;
}
.course-card.scenic::before { background: var(--blue); }
.course-card.quiet::before { background: var(--purple); }
.course-card.night::before { background: var(--orange); }
.course-card.workout::before { background: var(--red); }
.course-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.course-card.selected { border-color: var(--accent); background: var(--accent-dim2); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-name { font-size: 15px; font-weight: 700; }
.card-distance-from {
  font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace;
  background: var(--bg4); border-radius: 6px; padding: 3px 8px; flex-shrink: 0;
}
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.card-km { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 500; }
.card-feel { font-size: 12px; color: var(--text2); border-left: 1px solid var(--border2); padding-left: 8px; }
.card-desc { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }

/* 추천 인원 뱃지 */
.card-group {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(77,159,255,0.08); border: 0.5px solid rgba(77,159,255,0.25);
  border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--blue);
  margin-bottom: 10px;
}

.card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
.card-stats { display: flex; flex-direction: column; gap: 4px; }
.card-stat-row { display: flex; gap: 10px; align-items: center; }
.pop-bar { display: flex; gap: 2px; }
.pop-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
.pop-dot.on { background: var(--accent); }
.popularity { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.busy-time { font-size: 11px; color: var(--text3); }
.busy-time span { color: var(--orange); }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text3); background: var(--bg3); }
.tag.scenic { border-color: rgba(77,159,255,0.4); color: var(--blue); background: rgba(77,159,255,0.06); }
.tag.quiet { border-color: rgba(157,127,255,0.4); color: var(--purple); background: rgba(157,127,255,0.06); }
.tag.night { border-color: rgba(255,157,61,0.4); color: var(--orange); background: rgba(255,157,61,0.06); }
.tag.workout { border-color: rgba(255,77,77,0.4); color: var(--red); background: rgba(255,77,77,0.06); }
.save-btn {
  background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; flex-shrink: 0; transition: all 0.2s; align-self: flex-start;
}
.save-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.save-btn.saved { border-color: var(--accent); background: var(--accent-dim); }

/* DETAIL */
.detail-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); display: none; align-items: flex-end;
}
.detail-overlay.open { display: flex; }
.detail-sheet {
  width: 100%; max-height: 92vh; background: var(--bg2);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  overflow-y: auto; scrollbar-width: thin;
  animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }

.detail-header-img {
  width: 100%; height: 180px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0a1520 0%, #1a2535 60%, #0f2030 100%);
  display: flex; align-items: flex-end;
}
.detail-header-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(transparent, var(--bg2)); }
.detail-header-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 8px; }
.detail-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.5); border: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text); transition: all 0.15s;
}

.detail-body { padding: 20px 20px 100px; }
.detail-title { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
.detail-region { font-size: 13px; color: var(--text3); margin-bottom: 14px; }

/* 인원 뱃지 (상세) */
.detail-group-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(77,159,255,0.1); border: 0.5px solid rgba(77,159,255,0.3);
  border-radius: var(--radius-sm); padding: 8px 14px;
  font-size: 13px; color: var(--blue); margin-bottom: 16px; width: 100%;
}
.detail-group-icon { font-size: 16px; }

.detail-stats-row {
  display: flex; gap: 20px; margin-bottom: 20px;
  padding-bottom: 18px; border-bottom: 0.5px solid var(--border);
}
.detail-stat { display: flex; flex-direction: column; gap: 2px; }
.detail-stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.detail-stat-value { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
.detail-stat-sub { font-size: 11px; color: var(--text2); }

.detail-section { margin-bottom: 22px; }
.detail-section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; font-weight: 500; }

.vibe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.vibe-item {
  background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; display: flex; align-items: center; gap: 8px; font-size: 13px;
}
.vibe-item.yes { border-color: rgba(200,255,0,0.2); }
.vibe-item.no { color: var(--text3); }
.vibe-check { margin-left: auto; font-size: 12px; }
.vibe-item.yes .vibe-check { color: var(--accent); }
.vibe-item.no .vibe-check { color: var(--text3); }

.time-blocks { display: flex; flex-direction: column; gap: 8px; }
.time-block {
  background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.time-label { font-size: 12px; color: var(--text3); }
.time-value { font-size: 13px; font-weight: 500; }
.time-value.busy { color: var(--orange); }
.time-value.quiet-time { color: var(--accent); }

.facility-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.facility-item {
  font-size: 13px; padding: 8px 12px; background: var(--bg3);
  border-radius: var(--radius-sm); border: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.facility-item.yes { border-color: rgba(200,255,0,0.15); }
.facility-item.no { color: var(--text3); }

.fit-list { display: flex; flex-direction: column; gap: 6px; }
.fit-item {
  font-size: 13px; padding: 8px 12px; background: var(--bg3);
  border-radius: var(--radius-sm); display: flex; align-items: flex-start; gap: 8px; color: var(--text2);
}
.fit-item.good { color: var(--text); border-left: 2px solid var(--accent); }
.fit-item.warn { color: var(--text3); border-left: 2px solid var(--orange); }

.downside-list { display: flex; flex-direction: column; gap: 6px; }
.downside-item {
  font-size: 13px; color: var(--text2); padding: 8px 12px;
  background: var(--bg3); border-radius: var(--radius-sm);
  display: flex; gap: 8px; align-items: flex-start;
}
.downside-item::before { content: '—'; color: var(--text3); flex-shrink: 0; }

.total-review {
  background: var(--accent-dim); border: 0.5px solid var(--accent);
  border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.6; font-style: italic;
}

.detail-bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 14px 20px; background: var(--bg2);
  border-top: 0.5px solid var(--border); display: flex; gap: 10px; z-index: 10;
}
.detail-save-btn {
  flex: 1; padding: 13px; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
  color: var(--text); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
}
.detail-save-btn:hover, .detail-save-btn.saved { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.detail-record-btn {
  flex: 1; padding: 13px; background: var(--accent); border: none;
  border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  color: #000; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
}
.detail-record-btn:hover { background: var(--accent2); }

/* RECORD MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%; max-width: 480px; background: var(--bg2);
  border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 24px;
  animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 10px 12px;
  font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.difficulty-row, .want-row { display: flex; gap: 8px; }
.diff-btn, .want-btn {
  flex: 1; padding: 10px 8px; border-radius: var(--radius-sm);
  background: var(--bg3); border: 0.5px solid var(--border);
  font-size: 13px; color: var(--text2); cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; text-align: center; transition: all 0.15s;
}
.diff-btn.active, .want-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.star-row { display: flex; gap: 8px; }
.star { font-size: 22px; cursor: pointer; opacity: 0.3; transition: opacity 0.1s, transform 0.1s; }
.star.on { opacity: 1; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-cancel {
  flex: 1; padding: 12px; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 14px; color: var(--text2);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.modal-save {
  flex: 2; padding: 12px; background: var(--accent); border: none;
  border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  color: #000; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}

/* MY PAGE */
.mypage-overlay { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: none; flex-direction: column; }
.mypage-overlay.open { display: flex; }
.mypage-header {
  height: 56px; border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; padding: 0 20px;
  justify-content: space-between; flex-shrink: 0;
}
.mypage-title { font-size: 16px; font-weight: 700; }
.mypage-close {
  width: 32px; height: 32px; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text2);
}
.mypage-tabs { display: flex; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.mypage-tab {
  flex: 1; padding: 13px; font-size: 13px; color: var(--text3); cursor: pointer;
  text-align: center; border-bottom: 2px solid transparent;
  font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
}
.mypage-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.mypage-body { flex: 1; overflow-y: auto; padding: 16px; }
.storage-notice {
  background: rgba(255,157,61,0.08); border: 0.5px solid rgba(255,157,61,0.3);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-size: 12px; color: var(--orange); margin-bottom: 16px; line-height: 1.5;
}
.mypage-empty { text-align: center; padding: 40px 20px; font-size: 14px; color: var(--text3); }
.saved-course-item {
  background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius);
  padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer; transition: all 0.15s;
}
.saved-course-item:hover { border-color: var(--border2); }
.saved-course-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.saved-course-meta { font-size: 12px; color: var(--text3); }
.record-item { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
.record-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.record-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
.record-meta-item { font-size: 12px; color: var(--text2); }
.record-stars { color: var(--accent); font-size: 13px; margin-bottom: 4px; }
.record-memo { font-size: 12px; color: var(--text3); font-style: italic; }
.summary-card {
  background: var(--accent-dim); border: 0.5px solid rgba(200,255,0,0.3);
  border-radius: var(--radius); padding: 16px; display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
}
.summary-num { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--accent); }
.summary-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.mypage-section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 10px; font-weight: 500; }

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg4); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 10px 18px;
  font-size: 13px; opacity: 0; transition: all 0.3s;
  z-index: 400; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 로딩 */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 8px; color: var(--text3); font-size: 14px; }

@media(min-width: 700px) {
  .layout { flex-direction: row; }
  .map-area { width: 55%; height: 100%; min-height: unset; }
  .right-panel { width: 45%; }
  .detail-sheet { max-width: 520px; max-height: 100vh; border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
  .detail-overlay { align-items: flex-end; justify-content: flex-end; }
}
</style>

<body>

<nav class="nav">
  <div class="nav-logo">runner<span style="color:var(--accent);font-family:'DM Mono'">map</span>
    <span>내 주변 러닝 코스</span>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="openMyPage('saved')">♡ 저장</button>
    <button class="nav-btn" onclick="openMyPage('records')">📋 기록</button>
  </div>
</nav>

<div class="layout">
  <!-- MAP -->
  <div class="map-area" id="mapArea">
    <div id="kakaoMap"></div>
    <div class="map-overlay">
      <div class="map-overlay-btn" onclick="moveToMyLocation()">⊕</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="filter-bar">

<!-- ═══════════════════════════════════════
  카카오맵 SDK
  API 키 발급 후 아래 src의 ?appkey= 뒤에 넣으세요
  https://developers.kakao.com
═══════════════════════════════════════ -->
<script>
// ── 카카오맵 동적 로드 ──
function loadKakaoMap() {
  if (!KAKAO_APP_KEY || KAKAO_APP_KEY === 'YOUR_KAKAO_APP_KEY') {
    showMapPlaceholder();
    return;
  }
  const script = document.createElement('script');
  script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&libraries=services&autoload=false`;
  script.onload = () => {
    kakao.maps.load(() => {
      initKakaoMap();
    });
  };
  document.head.appendChild(script);
}

function showMapPlaceholder() {
  document.getElementById('kakaoMap').innerHTML = `
    <div class="map-placeholder">
      <div class="map-placeholder-icon">🗺️</div>
      <div class="map-placeholder-text">
        카카오맵 API 키를 넣으면 실제 지도가 표시돼요<br>
        <a href="https://developers.kakao.com" target="_blank">developers.kakao.com</a>에서 발급 후<br>
        index.html 상단 <code>KAKAO_APP_KEY</code>에 입력해주세요
      </div>
    </div>`;
}

let kakaoMap = null;
let myMarker = null;
let courseMarkers = [];

function initKakaoMap() {
  const container = document.getElementById('kakaoMap');
  const options = {
    center: new kakao.maps.LatLng(37.5326, 127.0246),
    level: 7
  };
  kakaoMap = new kakao.maps.Map(container, options);

  // 내 위치
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const myPos = new kakao.maps.LatLng(lat, lng);
      kakaoMap.setCenter(myPos);

      // 내 위치 마커
      const myContent = `<div style="width:14px;height:14px;border-radius:50%;background:#c8ff00;border:2px solid #fff;box-shadow:0 0 0 6px rgba(200,255,0,0.25)"></div>`;
      const myOverlay = new kakao.maps.CustomOverlay({ position: myPos, content: myContent });
      myOverlay.setMap(kakaoMap);

    }, () => {});
  }

  renderMapMarkers();
}

function renderMapMarkers() {
  if (!kakaoMap || !COURSES || !COURSES.length) return;

  courseMarkers.forEach(m => m.setMap(null));
  courseMarkers = [];

  const colorMap = { scenic: '#4d9fff', quiet: '#9d7fff', night: '#ff9d3d', workout: '#ff4d4d' };
  const filtered = getFilteredCourses();

  filtered.forEach(c => {
    const color = colorMap[c.type] || '#888';
    const content = `
      <div style="display:flex;flex-direction:column;align-items:center;cursor:pointer" onclick="openDetail(${c.id})">
        <div style="background:#161616;border:1px solid ${color};border-radius:6px;padding:3px 8px;font-size:11px;color:${color};font-family:'Noto Sans KR',sans-serif;white-space:nowrap;margin-bottom:4px;">${c.name}</div>
        <div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid #0d0d0d;"></div>
      </div>`;
    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content,
      yAnchor: 1
    });
    overlay.setMap(kakaoMap);
    courseMarkers.push(overlay);
  });
}

function moveToMyLocation() {
  if (!kakaoMap) return;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      kakaoMap.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
    });
  }
}
</script>

<script>
// ── 데이터 로드 ──
let COURSES = [];
let savedCourses = JSON.parse(localStorage.getItem('rm_saved') || '[]');
let recentCourses = JSON.parse(localStorage.getItem('rm_recent') || '[]');
let records = JSON.parse(localStorage.getItem('rm_records') || '[]');
let activeFilter = 'all';
let currentCourseId = null;
let recordStar = 0, recordDiff = '', recordWant = '';
let firstSave = localStorage.getItem('rm_firstsave') !== '1';

// courses.json 불러오기
fetch('courses.json')
  .then(r => r.json())
  .then(data => {
    COURSES = data;
    document.getElementById('courseCount').textContent = data.length;
    renderList();
    loadKakaoMap();
    // 카카오맵 이미 로드됐으면 바로 마커 렌더
    setTimeout(() => renderMapMarkers(), 1500);
  })
  .catch(() => {
    // 파일 직접 열 때(file://) fetch 안 됨 — 서버 필요 안내
    document.getElementById('courseList').innerHTML = `
      <div style="padding:20px;font-size:13px;color:var(--text3);line-height:1.7;">
        ⚠️ 로컬에서 직접 열면 JSON을 못 불러와요.<br>
        <code>npx serve .</code> 또는 VSCode Live Server로 실행해주세요.
      </div>`;
  });

function saveState() {
  localStorage.setItem('rm_saved', JSON.stringify(savedCourses));
  localStorage.setItem('rm_recent', JSON.stringify(recentCourses));
  localStorage.setItem('rm_records', JSON.stringify(records));
}

function addRecent(id) {
  recentCourses = recentCourses.filter(x => x !== id);
  recentCourses.unshift(id);
  if (recentCourses.length > 20) recentCourses.pop();
  saveState();
}

// ── 필터 ──
function getFilteredCourses() {
  return COURSES.filter(c => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'short') return c.shortCourse;
    return c.vibes[activeFilter] === true;
  });
}

function setFilter(el, filter) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = filter;
  renderList();
  renderMapMarkers();
}

// ── 리스트 렌더 ──
function renderList() {
  const filtered = getFilteredCourses();
  document.getElementById('courseCount').textContent = filtered.length;
  document.getElementById('courseList').innerHTML = filtered.map(cardHTML).join('');
}

function cardHTML(c) {
  const isSaved = savedCourses.includes(c.id);
  const popDots = Array.from({length:5},(_,i) => `<div class="pop-dot ${i<c.pop?'on':''}"></div>`).join('');
  const tags = c.tags.filter(([,label]) => label).map(([cls,label]) =>
    `<span class="tag ${cls}">${label}</span>`).join('');
  return `
  <div class="course-card ${c.type} ${currentCourseId===c.id?'selected':''}" onclick="openDetail(${c.id})">
    <div class="card-top">
      <div class="card-name">${c.name}</div>
      <div class="card-distance-from">${c.distFrom}</div>
    </div>
    <div class="card-meta">
      <div class="card-km">${c.km}km</div>
      <div class="card-feel">${c.feel}</div>
    </div>
    <div class="card-desc">${c.desc}</div>
    <div class="card-group">👥 ${c.groupSize.best}</div>
    <div class="card-bottom">
      <div class="card-stats">
        <div class="card-stat-row">
          <div class="popularity"><div class="pop-bar">${popDots}</div> 인기</div>
          <div class="busy-time">혼잡 <span>${c.busyTime}</span></div>
        </div>
        <div class="card-tags">${tags}</div>
      </div>
      <button class="save-btn ${isSaved?'saved':''}" onclick="event.stopPropagation();toggleSave(${c.id},this)">
        ${isSaved?'♥':'♡'}
      </button>
    </div>
  </div>`;
}

function toggleSave(id, btn) {
  if (savedCourses.includes(id)) {
    savedCourses = savedCourses.filter(x => x !== id);
    btn.classList.remove('saved'); btn.textContent = '♡';
    showToast('저장이 취소됐어요');
  } else {
    savedCourses.push(id);
    btn.classList.add('saved'); btn.textContent = '♥';
    if (firstSave) {
      firstSave = false; localStorage.setItem('rm_firstsave','1');
      showToast('💾 이 기기에 저장됐어요. 브라우저 초기화 시 사라질 수 있어요.');
    } else {
      showToast('💾 이 기기에 저장됐어요');
    }
  }
  saveState(); updateDetailSaveBtn();
}

// ── 상세 ──
function openDetail(id) {
  currentCourseId = id;
  addRecent(id);
  renderList();
  const c = COURSES.find(x => x.id === id);
  if (!c) return;

  const isSaved = savedCourses.includes(id);
  const popStr = '★'.repeat(c.pop) + '☆'.repeat(5-c.pop);

  const vibeItems = [
    [c.vibes.scenic,'🌅 경치 좋음'],
    [c.vibes.quiet, '🌿 조용함'],
    [c.vibes.night, '🌙 야간 안전'],
    [c.vibes.workout,'⛰ 업다운 있음']
  ].map(([v,label]) => `
    <div class="vibe-item ${v?'yes':'no'}">
      <span>${label}</span>
      <span class="vibe-check">${v?'✓':'✗'}</span>
    </div>`).join('');

  const facItems = [
    [c.facilities.toilet,'🚻 화장실'],
    [c.facilities.water, '💧 음수대'],
    [c.facilities.store, '🏪 편의점'],
    [c.facilities.spot,  '🧍 집결공간'],
  ].map(([v,label]) => `<div class="facility-item ${v?'yes':'no'}">${label} ${v?'있음':'없음'}</div>`).join('');

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-title">${c.name}</div>
    <div class="detail-region">${c.region}</div>
    <div class="detail-group-badge">
      <span class="detail-group-icon">👥</span>
      <span>${c.groupSize.best}</span>
    </div>
    <div class="detail-stats-row">
      <div class="detail-stat">
        <div class="detail-stat-label">거리</div>
        <div class="detail-stat-value">${c.km}km</div>
        <div class="detail-stat-sub">${c.feel}</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label">접근성</div>
        <div class="detail-stat-value">${c.distFrom}</div>
        <div class="detail-stat-sub">현재 위치 기준</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label">인기도</div>
        <div class="detail-stat-value" style="font-size:13px;color:var(--accent)">${popStr}</div>
        <div class="detail-stat-sub">저장 ${c.pop*68+42}명</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">코스 분위기</div>
      <div class="vibe-grid">${vibeItems}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">혼잡도 정보</div>
      <div class="time-blocks">
        <div class="time-block"><span class="time-label">많이 몰리는 시간</span><span class="time-value busy">${c.busy}</span></div>
        <div class="time-block"><span class="time-label">한산한 시간</span><span class="time-value quiet-time">${c.free}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">편의시설</div>
      <div class="facility-grid">${facItems}
        <div class="facility-item yes" style="grid-column:1/-1">🚦 ${c.facilities.signal}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">이 코스는 누구에게 잘 맞나요?</div>
      <div class="fit-list">${c.fit.map(f=>`<div class="fit-item ${f.good?'good':'warn'}">${f.good?'✓':'⚠'} ${f.text}</div>`).join('')}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">아쉬운 점</div>
      <div class="downside-list">${c.downsides.map(d=>`<div class="downside-item">${d}</div>`).join('')}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">한줄 총평</div>
      <div class="total-review">"${c.review}"</div>
    </div>`;

  const btn = document.getElementById('detailSaveBtn');
  btn.className = 'detail-save-btn' + (isSaved?' saved':'');
  btn.textContent = isSaved ? '♥ 저장됨' : '♡ 저장하기';
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }
function closeDetailOnBg(e) { if (e.target===document.getElementById('detailOverlay')) closeDetail(); }

function toggleDetailSave() {
  if (currentCourseId===null) return;
  const id = currentCourseId;
  const btn = document.getElementById('detailSaveBtn');
  if (savedCourses.includes(id)) {
    savedCourses = savedCourses.filter(x=>x!==id);
    btn.className='detail-save-btn'; btn.textContent='♡ 저장하기';
    showToast('저장이 취소됐어요');
  } else {
    savedCourses.push(id);
    btn.className='detail-save-btn saved'; btn.textContent='♥ 저장됨';
    if (firstSave) { firstSave=false; localStorage.setItem('rm_firstsave','1'); showToast('💾 이 기기에 저장됐어요. 브라우저 초기화 시 사라질 수 있어요.'); }
    else showToast('💾 이 기기에 저장됐어요');
  }
  saveState(); renderList();
}
function updateDetailSaveBtn() {
  if (currentCourseId===null) return;
  const isSaved = savedCourses.includes(currentCourseId);
  const btn = document.getElementById('detailSaveBtn');
  if (!btn) return;
  btn.className='detail-save-btn'+(isSaved?' saved':'');
  btn.textContent = isSaved?'♥ 저장됨':'♡ 저장하기';
}

// ── 기록 ──
function openRecordModal() {
  if (currentCourseId===null) return;
  document.getElementById('recordModalSub').textContent = COURSES.find(x=>x.id===currentCourseId)?.name;
  document.getElementById('recordDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('recordDuration').value='';
  document.getElementById('recordMemo').value='';
  recordStar=0; recordDiff=''; recordWant='';
  document.querySelectorAll('.diff-btn,.want-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));
  document.getElementById('recordModal').classList.add('open');
}
function closeRecordModal() { document.getElementById('recordModal').classList.remove('open'); }
function setDiff(btn) { document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); recordDiff=btn.dataset.diff; }
function setStar(n) { recordStar=n; document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<n)); }
function setWant(btn) { document.querySelectorAll('.want-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); recordWant=btn.dataset.want; }
function saveRecord() {
  const c = COURSES.find(x=>x.id===currentCourseId);
  if (!c) return;
  records.unshift({ id:'r'+Date.now(), courseId:c.id, courseName:c.name,
    date:document.getElementById('recordDate').value,
    duration:document.getElementById('recordDuration').value||'?',
    difficulty:recordDiff||'적당해', satisfaction:recordStar||3,
    wantAgain:recordWant!=='no', memo:document.getElementById('recordMemo').value });
  saveState(); closeRecordModal(); showToast('📋 기록이 저장됐어요!');
}

// ── 마이페이지 ──
let myTab='saved';
function openMyPage(tab) { myTab=tab; document.getElementById('mypageOverlay').classList.add('open'); switchMyTab(tab); }
function closeMyPage() { document.getElementById('mypageOverlay').classList.remove('open'); }
function switchMyTab(tab) {
  myTab=tab;
  ['saved','recent','records'].forEach(t=>{
    const el=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList.toggle('active',t===tab);
  });
  renderMyPage();
}
function renderMyPage() {
  const body=document.getElementById('mypageBody');
  const notice=`<div class="storage-notice">⚠ 이 기기에 저장된 정보예요. 브라우저 데이터를 삭제하면 사라질 수 있어요.</div>`;
  if (myTab==='saved') {
    if (!savedCourses.length) { body.innerHTML=notice+'<div class="mypage-empty">아직 저장한 코스가 없어요 ♡</div>'; return; }
    body.innerHTML=notice+`<div class="mypage-section-title">저장한 코스 (${savedCourses.length})</div>`+
      savedCourses.map(id=>{ const c=COURSES.find(x=>x.id===id); if(!c)return'';
        return `<div class="saved-course-item" onclick="openDetail(${id});closeMyPage()">
          <div><div class="saved-course-name">${c.name}</div><div class="saved-course-meta">${c.region} · ${c.km}km</div></div>
        </div>`; }).join('');
  }
  if (myTab==='recent') {
    if (!recentCourses.length) { body.innerHTML=notice+'<div class="mypage-empty">최근 본 코스가 없어요</div>'; return; }
    body.innerHTML=notice+`<div class="mypage-section-title">최근 본 코스 (${recentCourses.length})</div>`+
      recentCourses.map(id=>{ const c=COURSES.find(x=>x.id===id); if(!c)return'';
        return `<div class="saved-course-item" onclick="openDetail(${id});closeMyPage()">
          <div><div class="saved-course-name">${c.name}</div><div class="saved-course-meta">${c.region} · ${c.km}km</div></div>
        </div>`; }).join('');
  }
  if (myTab==='records') {
    if (!records.length) { body.innerHTML=notice+'<div class="mypage-empty">아직 기록이 없어요 📝</div>'; return; }
    const avg=Math.round(records.reduce((s,r)=>s+r.satisfaction,0)/records.length*10)/10;
    const want=records.filter(r=>r.wantAgain).length;
    body.innerHTML=notice+`<div class="summary-card">
      <div><div class="summary-num">${records.length}</div><div class="summary-label">총 기록</div></div>
      <div><div class="summary-num">⭐${avg}</div><div class="summary-label">평균 만족도</div></div>
      <div><div class="summary-num">${want}</div><div class="summary-label">다시 뛰고 싶은</div></div>
    </div>`+`<div class="mypage-section-title">내 기록 (${records.length})</div>`+
      records.map(r=>`<div class="record-item">
        <div class="record-name">${r.courseName}</div>
        <div class="record-meta">
          <span class="record-meta-item">📅 ${r.date}</span>
          <span class="record-meta-item">⏱ ${r.duration}분</span>
          <span class="record-meta-item">💪 ${r.difficulty}</span>
          <span class="record-meta-item">${r.wantAgain?'👍 또 뛰고 싶어':'😅 아직은 글쎄'}</span>
        </div>
        <div class="record-stars">${'★'.repeat(r.satisfaction)+'☆'.repeat(5-r.satisfaction)}</div>
        ${r.memo?`<div class="record-memo">"${r.memo}"</div>`:''}
      </div>`).join('');
  }
}

// ── 토스트 ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
