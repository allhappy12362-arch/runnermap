<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>러너맵 — 내 주변 러닝 코스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
  const KAKAO_APP_KEY = '9dbad49657d4d6f01527fa33163de6ff';
</script>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">runner<span style="color:var(--accent);font-family:'DM Mono'">map</span>
    <span>내 주변 러닝 코스</span>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="openMyPage('saved')">♡ 저장</button>
    <button class="nav-btn" onclick="openMyPage('records')">📋 기록</button>
  </div>
</nav>

<div class="layout">
  <!-- MAP -->
  <div class="map-area" id="mapArea">
    <!-- 전광판 티커 -->
    <div class="ticker-wrap">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
    <div id="kakaoMap"></div>
    <!-- 코스 경로 정보 (ticker 아래) -->
    <div class="route-info-overlay" id="routeInfoOverlay">
      <div>
        <div class="route-info-km" id="routeInfoKm"></div>
        <div class="route-info-name" id="routeInfoName"></div>
      </div>
      <button class="route-info-close" onclick="clearRouteOverlay()">✕</button>
    </div>
    <!-- 우상단: 인기코스 + 코스제보 -->
    <div class="fab-top-right">
      <button class="fab-popular" onclick="openPopularModal()">🏆 인기코스</button>
      <button class="fab-report" onclick="openReportModal()">✏️ 코스 제보하기</button>
    </div>
    <!-- 우측 중간: 내 위치 버튼 -->
    <button class="fab-myloc" onclick="moveToMyLocation()" title="내 위치">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="2" x2="12" y2="7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12" y2="22" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="17" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
    </button>
  </div>

<!-- DETAIL SHEET -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetailOnBg(event)">
  <div class="detail-sheet" id="detailSheet">
    <div class="detail-header-img" id="detailHeaderImg">
      <div class="detail-header-gradient"></div>
      <div class="detail-header-actions">
        <label class="detail-icon-btn" id="imgUploadBtn" title="이미지 업로드" style="cursor:pointer">
          📷
          <input type="file" accept="image/*" style="display:none" onchange="uploadCourseImage(event)">
        </label>
        <div class="detail-icon-btn" onclick="closeDetail()">✕</div>
      </div>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-bottom-bar">
      <button class="detail-save-btn" id="detailSaveBtn" onclick="toggleDetailSave()">♡ 저장하기</button>
      <button class="detail-record-btn" onclick="openRecordModal()">📝 기록 남기기</button>
      <button class="detail-share-btn" onclick="shareCurrentCourse()">🔗</button>
    </div>
  </div>
</div>

<!-- RECORD MODAL -->
<div class="modal-overlay" id="recordModal">
  <div class="modal">
    <div class="modal-title">기록 남기기</div>
    <div class="modal-sub" id="recordModalSub"></div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input type="date" class="form-input" id="recordDate">
    </div>
    <div class="form-group">
      <label class="form-label">뛴 시간 (분)</label>
      <input type="number" class="form-input" id="recordDuration" placeholder="예: 45">
    </div>
    <div class="form-group">
      <label class="form-label">체감 난이도</label>
      <div class="difficulty-row">
        <button class="diff-btn" data-diff="쉬웠어" onclick="setDiff(this)">😌 쉬웠어</button>
        <button class="diff-btn" data-diff="적당해" onclick="setDiff(this)">😤 적당해</button>
        <button class="diff-btn" data-diff="힘들었어" onclick="setDiff(this)">😵 힘들었어</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">만족도</label>
      <div class="star-row" id="starRow">
        <span class="star" onclick="setStar(1)">★</span>
        <span class="star" onclick="setStar(2)">★</span>
        <span class="star" onclick="setStar(3)">★</span>
        <span class="star" onclick="setStar(4)">★</span>
        <span class="star" onclick="setStar(5)">★</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">다시 뛰고 싶어요?</label>
      <div class="want-row">
        <button class="want-btn" data-want="yes" onclick="setWant(this)">👍 또 뛰고 싶어</button>
        <button class="want-btn" data-want="no" onclick="setWant(this)">😅 아직은 글쎄</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">한줄 메모</label>
      <input type="text" class="form-input" id="recordMemo" placeholder="오늘 날씨 최고였다">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeRecordModal()">취소</button>
      <button class="modal-save" onclick="saveRecord()">저장하기</button>
    </div>
  </div>
</div>

<!-- 인기코스 모달 -->
<div class="popular-overlay" id="popularOverlay" onclick="closePopularOnBg(event)">
  <div class="popular-sheet">
    <div class="popular-header">
      <div class="popular-title">🏆 인기코스 TOP 10</div>
      <button class="popular-close" onclick="closePopularModal()">✕</button>
    </div>
    <div class="popular-list" id="popularList"></div>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="report-overlay" id="reportOverlay" onclick="closeReportOnBg(event)">
  <div class="report-sheet">
    <div class="report-header">
      <div class="report-title">코스 제보하기</div>
      <button class="report-close" onclick="closeReportModal()">✕</button>
    </div>
    <div class="report-sub">지도를 탭해서 경로를 직접 그려주세요 🏃</div>

    <!-- ① 경로 그리기 지도 -->
    <div class="form-group">
      <label class="form-label">경로 그리기 * <span class="report-map-hint" id="reportMapHint">지도를 탭해서 경유점을 찍어주세요</span></label>
      <div class="report-map-wrap">
        <div id="reportMap"></div>
        <div class="report-map-toolbar">
          <button class="rmap-btn rmap-undo" onclick="reportMapUndo()">↩ 되돌리기</button>
          <div class="rmap-dist" id="reportMapDist">0.0 km</div>
          <button class="rmap-btn rmap-reset" onclick="reportMapReset()">✕ 초기화</button>
        </div>
      </div>
    </div>

    <!-- ② 코스 이름 -->
    <div class="form-group">
      <label class="form-label">코스 이름 *</label>
      <input class="form-input" type="text" id="rName" placeholder="예: 망원한강공원 코스">
    </div>

    <!-- ③ 거리 (자동입력) -->
    <div class="form-group">
      <label class="form-label">거리 (km) * <span style="font-size:11px;color:var(--accent)">경로 그리면 자동 입력</span></label>
      <input class="form-input" type="number" id="rKm" placeholder="예: 5.2" step="0.1" min="0.5" max="50">
    </div>

    <!-- ④ 코스 타입 (대표 1개) -->
    <div class="form-group">
      <label class="form-label">코스 대표 타입 * <span style="font-size:11px;color:var(--text3)">1개 선택</span></label>
      <div class="report-type-grid">
        <button class="report-type-btn" onclick="selectReportType(this,'scenic')">🌅<br>경치좋음</button>
        <button class="report-type-btn" onclick="selectReportType(this,'quiet')">🌿<br>조용함</button>
        <button class="report-type-btn" onclick="selectReportType(this,'night')">🌙<br>야간러닝</button>
        <button class="report-type-btn" onclick="selectReportType(this,'workout')">💪<br>업다운</button>
      </div>
    </div>

    <!-- ⑤ 코스 분위기 (복수선택) -->
    <div class="form-group">
      <label class="form-label">코스 분위기 <span style="font-size:11px;color:var(--text3)">복수 선택 가능</span></label>
      <div class="report-multi-grid">
        <button class="report-multi-btn" data-key="scenic" onclick="toggleReportMulti(this)">🌅 경치 좋음</button>
        <button class="report-multi-btn" data-key="quiet" onclick="toggleReportMulti(this)">🌿 조용함</button>
        <button class="report-multi-btn" data-key="night" onclick="toggleReportMulti(this)">🌙 야간 안전</button>
        <button class="report-multi-btn" data-key="workout" onclick="toggleReportMulti(this)">⛰ 업다운 있음</button>
        <button class="report-multi-btn" data-key="crowd" onclick="toggleReportMulti(this)">👥 사람 많음</button>
        <button class="report-multi-btn" data-key="solo" onclick="toggleReportMulti(this)">🧘 혼자 뛰기 좋음</button>
        <button class="report-multi-btn" data-key="flat" onclick="toggleReportMulti(this)">📏 평탄한 길</button>
        <button class="report-multi-btn" data-key="photo" onclick="toggleReportMulti(this)">📸 포토스팟</button>
      </div>
    </div>

    <!-- ⑥ 편의시설 (복수선택) -->
    <div class="form-group">
      <label class="form-label">편의시설 <span style="font-size:11px;color:var(--text3)">있는 것만 선택</span></label>
      <div class="report-multi-grid">
        <button class="report-multi-btn" data-key="toilet" onclick="toggleReportMulti(this)">🚻 화장실</button>
        <button class="report-multi-btn" data-key="water" onclick="toggleReportMulti(this)">💧 음수대</button>
        <button class="report-multi-btn" data-key="store" onclick="toggleReportMulti(this)">🏪 편의점</button>
        <button class="report-multi-btn" data-key="spot" onclick="toggleReportMulti(this)">🧍 집결공간</button>
        <button class="report-multi-btn" data-key="parking" onclick="toggleReportMulti(this)">🅿️ 주차 가능</button>
        <button class="report-multi-btn" data-key="nosignal" onclick="toggleReportMulti(this)">🚦 신호등 없음</button>
        <button class="report-multi-btn" data-key="light" onclick="toggleReportMulti(this)">💡 야간 조명</button>
        <button class="report-multi-btn" data-key="bench" onclick="toggleReportMulti(this)">🪑 벤치/쉼터</button>
      </div>
    </div>

    <!-- ⑦ 한줄 설명 -->
    <div class="form-group">
      <label class="form-label">한줄 설명 *</label>
      <input class="form-input" type="text" id="rDesc" placeholder="예: 야경 보며 뛰기 딱 좋은 코스" maxlength="40">
    </div>

    <button class="report-google-btn" onclick="submitReport()">
      📍 제보 등록하기
    </button>
  </div>
</div>

<!-- MY PAGE -->
<div class="mypage-overlay" id="mypageOverlay">
  <div class="mypage-header">
    <div class="mypage-title">내 저장 & 기록</div>
    <div class="mypage-close" onclick="closeMyPage()">✕</div>
  </div>
  <div class="mypage-tabs">
    <div class="mypage-tab active" id="tabSaved" onclick="switchMyTab('saved')">저장한 코스</div>
    <div class="mypage-tab" id="tabRecent" onclick="switchMyTab('recent')">최근 본 코스</div>
    <div class="mypage-tab" id="tabRecords" onclick="switchMyTab('records')">내 기록</div>
    <div class="mypage-tab" id="tabBadge" onclick="switchMyTab('badge')">🏅 뱃지</div>
    <div class="mypage-tab" id="tabReports" onclick="switchMyTab('reports')">내 제보</div>
  </div>
  <div class="mypage-body" id="mypageBody"></div>
</div>

<div class="toast" id="toast"></div>

═══════════════════════════════════════ -->
<script src="app.js"></script>
</body>
</html>
